# Smart Farm MQTT - Mosquitto 설정
# 경로: /etc/mosquitto/conf.d/smart-farm.conf

# MQTT 기본 포트 (로컬 네트워크)
listener 1883 0.0.0.0

# WebSocket 포트 (브라우저 직접 연결용, 선택)
listener 9001 0.0.0.0
protocol websockets

# 인증 (개발 단계에서는 anonymous 허용)
# 운영 시 password_file 설정 권장
allow_anonymous true
# password_file /etc/mosquitto/passwd

# 메시지 영속성 (재부팅 시 retain 메시지 보존)
persistence true
persistence_location /var/lib/mosquitto/

# 로그
log_dest syslog
log_type error
log_type warning
log_type notice

# 성능 설정
max_queued_messages 10000
message_size_limit 0
